<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Rounded elegant dark slate square background -->
  <rect width="64" height="64" rx="16" fill="#0f172a" />
  
  <!-- Overlapping glossy tile diamond (base) -->
  <path d="M32 10 L52 30 L32 50 L12 30 Z" fill="url(#tile-grad)" />
  
  <!-- Inner accent highlight glaze reflection to give premium vitrified look -->
  <path d="M32 16 L46 30 L32 44 L18 30 Z" fill="#ffffff" opacity="0.35" />
  
  <!-- Golden "C" letter elegantly integrated in the middle representing Chani Tiles -->
  <path d="M38 24 C28 24 24 28 24 32 C24 36 28 40 38 40" fill="none" stroke="#0f172a" stroke-width="5" stroke-linecap="round" />
  <path d="M38 24 C28 24 24 28 24 32 C24 36 28 40 38 40" fill="none" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round" />
  
  <defs>
    <linearGradient id="tile-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#cbd5e1" />
    </linearGradient>
  </defs>
</svg>
